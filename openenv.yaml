spec_version: 1
openenv_version: "0.2.0"
name: my_env
version: "1.0.0"
description: Complaint-resolution benchmark with five graded customer-support tasks.
author: hackathon-submission
type: space
runtime: fastapi
app: server.app:app
port: 8000

action_type: models.MyAction
observation_type: models.MyObservation
reward_type: float
agent:
  module: inference
  function: main

client:
  class_name: MyEnv
  module: client

action:
  class_name: MyAction
  module: models

observation:
  class_name: MyObservation
  module: models

grader:
  module: grader
  function: grade
  score_range:
    min_exclusive: 0.0
    max_exclusive: 1.0

tasks:
  - id: easy
    name: Late Delivery Recovery
    difficulty: easy
    description: Customer reports a delayed order.
    max_steps: 5
    success_threshold: 0.72
    grader:
      module: grader
      function: grade
    grader_id: grade
    has_grader: true

  - id: easy2
    name: Wrong Item Exchange
    difficulty: easy
    description: Customer wants to exchange wrong item.
    max_steps: 5
    success_threshold: 0.71
    grader:
      module: grader
      function: grade
    grader_id: grade
    has_grader: true

  - id: medium
    name: Damaged Item Refund Or Replacement
    difficulty: medium
    description: Customer wants replacement or refund for damaged item.
    max_steps: 6
    success_threshold: 0.75
    grader:
      module: grader
      function: grade
    grader_id: grade
    has_grader: true

  - id: medium2
    name: Service Outage Escalation
    difficulty: medium
    description: Customer reports service outage.
    max_steps: 6
    success_threshold: 0.74
    grader:
      module: grader
      function: grade
    grader_id: grade
    has_grader: true

  - id: hard
    name: Duplicate Charge Resolution
    difficulty: hard
    description: Customer reports duplicate charge.
    max_steps: 7
    success_threshold: 0.73
    grader:
      module: grader
      function: grade
    grader_id: grade
    has_grader: true

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  metadata: GET /metadata
  tasks: GET /tasks
  validate: GET /validate

tags:
  - openenv
  - benchmark
